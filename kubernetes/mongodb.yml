apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-deployment
  namespace: wanderlust
  labels:
    app: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:latest
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
      volumes:
      - name: mongodb-storage
        persistentVolumeClaim:
          claimName: mongodb-pvc


---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: wanderlust
spec:
  selector:
    app: mongodb
  type: ClusterIP 
  ports:
    - protocol: TCP
      port: 27017  # The port that the service will expose (this is the port that other services will use to access MongoDB)
      targetPort: 27017 # The port on the container that the service will forward traffic to
